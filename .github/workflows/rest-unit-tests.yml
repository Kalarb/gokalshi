name: REST Unit Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rest-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run REST unit tests with coverage
        run: go test -skip 'TestWSClient|TestNewWSClient|TestNewChannelState|TestMsgTypeToChannel' ./... -v -count=1 -coverprofile=coverage.out

      - name: Display coverage
        run: go tool cover -func=coverage.out | tail -1

      - name: Run with race detector
        run: go test -race -skip 'TestWSClient|TestNewWSClient|TestNewChannelState|TestMsgTypeToChannel' ./... -count=1
