name: AsyncAPI Validation

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  asyncapi-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Validate WS channels against AsyncAPI spec
        id: validate
        continue-on-error: true
        run: go test -tags spec_validation -run TestAsyncAPIWSChannelCoverage -v -count=1 -timeout 30s

      - name: Update badge
        uses: Schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 65579a629076066fcbf09520ca76301a
          filename: go-asyncapi-status.json
          label: AsyncAPI (Go)
          message: ${{ steps.validate.outcome == 'success' && 'Up-to-date' || 'Behind' }}
          color: ${{ steps.validate.outcome == 'success' && 'green' || 'yellow' }}
