name: OpenAPI Validation

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  openapi-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate REST API against OpenAPI spec
        run: go test -tags spec_validation -run TestOpenAPICoverage -v -count=1 -timeout 30s
