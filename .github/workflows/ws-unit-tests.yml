name: WS Unit Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ws-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run WS unit tests
        run: go test -run 'TestWSClient|TestNewWSClient|TestNewChannelState|TestMsgTypeToChannel' ./... -v -count=1
